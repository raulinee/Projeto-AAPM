{% extends "base.html" %}

{% block title %}Categoria — AAPM PDV{% endblock %}

{% block styles %}
<link rel="stylesheet" href="/static/css/categorias.css">
{% endblock %}

{% block content %}

<div class="page-wrapper form-page">

    <div class="page-header">
        <div class="title-area">
            <h2>
                {{ "Editar Categoria" if editando else "Nova Categoria" }}
            </h2>
            <p>Preencha os dados da categoria</p>
        </div>
    </div>

    {% if erro %}
    <div class="alert alert-danger">
        {{ erro }}
    </div>
    {% endif %}

    <div class="form-card">

        <form method="post"
              action="{{ '/categorias/' + editando.id|string + '/editar' if editando else '/categorias/nova' }}">

            <div class="form-group">
                <label>Nome da Categoria</label>

                <input type="text"
                       name="nome"
                       class="form-control"
                       value="{{ editando.nome if editando else '' }}"
                       required>
            </div>

            <button type="submit" class="btn-primary full">
                Salvar
            </button>

            <a href="/categorias" class="btn-cancel">
                Cancelar
            </a>

        </form>

    </div>

</div>

{% endblock %}
