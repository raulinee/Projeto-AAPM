{% extends "base.html" %}

{% block title %}{{ "Editar Categoria" if editando else "Nova Categoria" }} — AAPM PDV{% endblock %}

{% block styles %}
<link rel="stylesheet" href="/static/css/produtos.css">
{% endblock %}

{% block content %}
<div class="page-wrapper form-wrapper">
    <div class="form-card">
        
        <a href="/categorias" class="close-btn" title="Cancelar">
            <i data-lucide="x"></i>
        </a>

        <h2 class="form-title">{{ "Editar Categoria" if editando else "Nova Categoria" }}</h2>

        {% if erro %}
            <div class="alert-error">{{ erro }}</div>
        {% endif %}

        <form method="post"
              action="{{ '/categorias/' + editando.id|string + '/editar' if editando else '/categorias/nova' }}">

            <div class="form-group">
                <label class="form-label">Nome da Categoria</label>
                <input type="text"
                       name="nome"
                       class="form-control"
                       value="{{ editando.nome if editando else (valores.nome if valores else '') }}"
                       required>
            </div>

            <div class="form-group" style="flex-direction: row; align-items: center; gap: 10px; margin-top: 20px;">
                <input type="checkbox" 
                       name="ativo" 
                       id="ativo" 
                       style="width: 18px; height: 18px; cursor: pointer;" 
                       {{ 'checked' if not editando or editando.ativo else '' }}>
                <label for="ativo" class="form-label" style="margin: 0; cursor: pointer; user-select: none;">
                    Categoria Ativa (visível para adicionar produtos)
                </label>
            </div>

            <button type="submit" class="btn-submit" style="margin-top: 24px;">
                <i data-lucide="save" style="width:16px;height:16px;"></i>
                {{ "Salvar Categoria" if editando else "Criar Categoria" }}
            </button>

        </form>

    </div>
</div>
{% endblock %}
